            animation: scroll-ltr var(--ticker-duration, 60s) linear infinite;

            0% { transform: translateX(0%); }

}

        .meal-medical {

   function setLanguage(lang, btnElement) {
       const t = translations[lang];
       if (!t) return;

       document.querySelectorAll('.lang-btn').forEach(b => b.disabled = true);

       btnElement.innerHTML = `<span class="flex items-center justify-center gap-2">
           <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24">
               <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
               <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
           </svg>
           ${t.loading}
       </span>`;

       setTimeout(() => {
           currentLang = lang;

           document.documentElement.lang = lang;
           document.documentElement.dir = t.dir;

           const welcomeTitle = document.getElementById('welcomeTitle');
           const enterBtn = document.getElementById('enterBtn');

           if (welcomeTitle) welcomeTitle.textContent = t.title;
           if (enterBtn) enterBtn.textContent = t.btn;

           document.querySelectorAll('.lang-btn').forEach(b => {
               b.disabled = false;
               b.classList.remove('active');
               const originalText = { ar: 'عربي', en: 'English', fa: 'فارسی', ru: 'Русский' };
               b.innerHTML = originalText[b.dataset.lang];
           });
           btnElement.classList.add('active');

           rebuildTicker();
           restartMealCycle();

           localStorage.setItem('preferredLang', lang);
       }, 2000);
   }

   function loadSavedLanguage() {
       const saved = localStorage.getItem('preferredLang') || 'ar';
       const t = translations[saved] || translations.ar;

       currentLang = saved;
       document.documentElement.lang = saved;
       document.documentElement.dir = t.dir;

       const welcomeTitle = document.getElementById('welcomeTitle');
       const enterBtn = document.getElementById('enterBtn');

       if (welcomeTitle) welcomeTitle.textContent = t.title;
       if (enterBtn) enterBtn.textContent = t.btn;

       document.querySelectorAll('.lang-btn').forEach(b => {
           b.classList.toggle('active', b.dataset.lang === saved);
       });
   }

   // ════════════════════════════════════════════════════════════
   // III. دوال البيانات والتحليل
   // ════════════════════════════════════════════════════════════

   function getMeals(data) {
       return data.filter(item => item.hasOwnProperty('الرقم'));
   }

   function getMealName(meal, lang) {
       if (!meal) return '';
       if (meal.الاسم && meal.الاسم[lang]) {
           return String(meal.الاسم[lang]).trim();
       }
       if (meal.اسم_الوجبة) {
           return String(meal.اسم_الوجبة).trim();
       }
       return 'وجبة غير معنونة';
   }

   function createSeparator(index) {
       const icon = separatorIcons[index % separatorIcons.length];
       return `<div class="meal-separator"><div class="separator-line"></div><div class="separator-icon-wrapper"><div class="separator-dot"></div><span class="separator-icon">${icon}</span><div class="separator-dot"></div></div><div class="separator-line"></div></div>`;
   }

   const cleanDiseaseKey = (rawKey) => {
       if (typeof rawKey !== 'string') return '';
       return rawKey.replace(/^مرضى\s+/, '').trim();
   };

 /**
 * تنسيق ترتيب عرض القيمة والوحدة/المكون والأيقونة بناءً على اللغة.
 * @param {string} icon - رمز الأيقونة (مثل '🌾').
 * @param {string} value - القيمة الرقمية.
 * @param {string} unitOrIngredient - الوحدة أو اسم المكون المترجم.
 * @param {string} lang - اللغة الحالية.
 * @returns {string} - المحتوى بالترتيب الصحيح.
 */
function formatNutrientOrder(icon, value, unitOrIngredient, lang) {
    // المحتوى الذي يتبدل هو: الأيقونة + المكون + القيمة

    // اللغات ذات الاتجاه LTR: الإنجليزية والروسية
    if (lang === 'en' || lang === 'ru') {
        // LTR: الأيقونة المكون القيمة (Icon Ingredient Value)
        return `${icon} ${unitOrIngredient} ${value}`;
    } else {
        // RTL: القيمة المكون الأيقونة (Value Ingredient Icon)
        return `${value} ${unitOrIngredient} ${icon}`;
    }
}

/**
 * دالة مساعدة لتطبيق فاصل سطر إذا تجاوز الاسم 3 كلمات.
 */
function formatMealName(name) {
    if (!name || typeof name !== 'string') return '';

    const words = name.trim().split(/\s+/);

    if (words.length > 3) {
        const firstPart = words.slice(0, 3).join(' ');
        const secondPart = words.slice(3).join(' ');
        return `${firstPart}<br>${secondPart}`;
    }

    return name;
}

/**
 * دالة مساعدة لتحليل نص الملاءمة (تحتوي على المفتاح للترجمة).
 */
const getSuitabilityInfo = (suitabilityText) => {
    const text = String(suitabilityText).trim();
    if (text.includes('غير مناسبة')) return { icon: '❌', key: 'unsuitable', css: 'unsuitable' };
    if (text.includes('بحذر')) return { icon: '⚠️', key: 'caution', css: 'caution' };
    if (text.includes('مناسبة')) return { icon: '✅', key: 'suitable', css: 'suitable' };
    return { icon: '❓', key: 'unknown', css: 'unknown' };
};


// ════════════════════════════════════════════════════════════
// IV. بناء عنصر الوجبة (buildMealItem)
// ════════════════════════════════════════════════════════════

function buildMealItem(meal, lang) {

    const t = translations[lang] || translations.ar;

    const rawName = getMealName(meal, lang);
    const formattedName = formatMealName(rawName);

    const nutritionData = meal.القيمة_الغذائية || {};
    const medicalData = meal.التحليل_الطبي || [];

    const rawCaloriesValue = parseFloat(String(nutritionData.السعرات || '0').replace(/g/i, '').trim());
    const formattedCalories = isNaN(rawCaloriesValue) ? '؟' : Math.round(rawCaloriesValue);
    const rawCarbs = nutritionData.الكربوهيدرات || '؟';

    const medicalMap = {};
    medicalData.forEach(analysis => {
        const keyToStore = cleanDiseaseKey(analysis.الحالة_المرضية.ar);
        medicalMap[keyToStore] = analysis;
    });

    const requiredDiseases = [
        { key: 'السكري', localized: t.diabetes, css_class: 'diabetic' },
        { key: 'الضغط', localized: t.pressure, css_class: 'pressure' },
        { key: 'الدهنيات', localized: t.lipids, css_class: 'lipid' },
        { key: 'النقرس', localized: t.gout, css_class: 'gout' },
        { key: 'الكلى', localized: t.kidney, css_class: 'kidney' }
    ];

    const getDiseaseBadge = (disease) => {
         const keyToSearch = cleanDiseaseKey(disease.key);
         const status = medicalMap[keyToSearch];

         const suitabilityTextAR = String(status ? status.الملاءمة.ar : 'غير معروف').trim();
         const { icon, key, css } = getSuitabilityInfo(suitabilityTextAR);

         const localizedText = t[key] || key;

        return `<span class="medical-badge ${disease.css_class} ${css}">
            <span class="badge-icon">${icon}</span>
            <span class="badge-text">${disease.localized}: ${localizedText}</span>
        </span>`;
    };

    // تجهيز محتوى المؤشرات الغذائية بالترتيب الشرطي (باستخدام الأيقونة كمعامل أول) 🎯
    const carbsContent = formatNutrientOrder('🌾', rawCarbs, t.carbs || '', lang);
    const fatContent = formatNutrientOrder('🧈', nutritionData.الدهون || '؟', t.fat || '', lang);
    const proteinContent = formatNutrientOrder('💪', nutritionData.البروتين || '؟', t.protein || '', lang);

    // تحديد ما إذا كانت اللغة الحالية هي RTL (لأجل السعرات الحرارية والتبديل)
    const isRTL = (lang === 'ar' || lang === 'fa');

    return `
        <div class="meal-item">

            <div class="meal-header">

                <div class="meal-name-primary" data-order="1">
                    ${formattedName}
                </div>

                <div class="meal-calories-main" data-order="2">
                    ${isRTL ?
                        // RTL (AR/FA): القيمة، ثم الأيقونة، ثم الوحدة
                        `<span class="calories-value">${formattedCalories}</span><span class="calories-icon"></span><span class="calories-unit">${t.kcal}🔥</span>` :
                        // LTR (EN/RU): الوحدة، ثم الأيقونة، ثم القيمة
                        `<span class="calories-unit">${t.kcal}🔥</span><span class="calories-icon"></span><span class="calories-value">${formattedCalories}</span>`
                    }
                </div>

                <span class="nutrition-badge carbs-header" data-order="3">
                     ${carbsContent}
                </span>

                <div class="meal-name-primary" data-order="4">
                    ${formattedName}
                </div>

            </div>

            <div class="meal-nutrition-row">
                <div class="nutrition-info-text-start" data-order="3">${t.ingredients_per_100g}</div>

                <span class="nutrition-badge fat" data-order="2">
                     ${fatContent}
                </span>

                <span class="nutrition-badge protein" data-order="1">
                     ${proteinContent}
                </span>
            </div>

            <div class="meal-medical">
                ${getDiseaseBadge(requiredDiseases[4])} ${getDiseaseBadge(requiredDiseases[3])} ${getDiseaseBadge(requiredDiseases[2])} ${getDiseaseBadge(requiredDiseases[1])} ${getDiseaseBadge(requiredDiseases[0])}
            </div>
        </div>
    `;
}

   // ════════════════════════════════════════════════════════════
   // V. دوال دورة التطبيق والتحكم في المؤقتات
   // ════════════════════════════════════════════════════════════

   function initTicker() {
       if (typeof ANALYSED_MEALS_DATA === 'undefined') {
           console.error('❌ ملف البيانات ANALYSED_MEALS_DATA غير موجود. لن يتم بناء الشريط.');
           return;
       }

       mealsData = getMeals(ANALYSED_MEALS_DATA);
       if (mealsData.length === 0) {
           console.warn('⚠️ تم تحميل ملف البيانات لكنه لا يحتوي على وجبات صالحة.');
           return;
       }
       console.log(`✅ تم تحميل ${mealsData.length} وجبة`);

       rebuildTicker();
       startMealCycle();
   }

   function rebuildTicker() {
       const track = document.getElementById('tickerTrack');
       if (!track || !mealsData.length) return;

       track.style.animation = 'none';

       let html = '';
       mealsData.forEach((meal, index) => {
           if (index > 0) { html += createSeparator(index); }
           html += buildMealItem(meal, currentLang);
       });

       const bridgeSeparator = createSeparator(mealsData.length);
       track.innerHTML = html + bridgeSeparator + html;

       track.classList.remove('ltr-scroll', 'rtl-scroll');

       const trackWidth = track.scrollWidth / 4;
       const tickerDuration = trackWidth / TIMING.TICKER_SPEED;
       track.style.setProperty('--ticker-duration', `${tickerDuration}s`);

       track.offsetHeight;

       if (currentLang === 'ar' || currentLang === 'fa') {
           track.classList.add('ltr-scroll');
       } else {
           track.classList.add('rtl-scroll');
       }

       track.style.animation = '';
   }

   function startMealCycle() {
       if (!mealsData.length) return;

       currentIndex = 0;
       showCurrentMeal();

       // نستخدم الآن GAP_BETWEEN_MEALS فقط لتحديد المدة الزمنية للعرض
       const totalMealTime = TIMING.GAP_BETWEEN_MEALS * 5000;

       mealCycleInterval = setInterval(() => {
           currentIndex = (currentIndex + 1) % mealsData.length;
           showCurrentMeal();
       }, totalMealTime);

       startProgressBar(totalMealTime);
   }

   function restartMealCycle() {
       if (mealCycleInterval) clearInterval(mealCycleInterval);
       // ❌ تم حذف nameTimeout و hideTimeout
       if (progressInterval) cancelAnimationFrame(progressInterval);

       currentIndex = 0;
       startMealCycle();
   }

   function showCurrentMeal() {

    const counterEl = document.getElementById('mealCounter');
    if (!counterEl) return;

    // 1. تحديد القول المأثور بناءً على فهرس الوجبة الحالي
    // نستخدم الـ 'Modulus %' للتأكد من أننا نعود إلى بداية قائمة الأقوال إذا كانت أقصر من عدد الوجبات
    const quoteIndex = currentIndex % quotesData.length;
    const quoteText = quotesData[quoteIndex][currentLang] || quotesData[quoteIndex].ar;

    // 2. تحديث محتوى العنصر mealCounter بالقول المأثور
    counterEl.textContent = quoteText;
}


   function startProgressBar(totalTime) {
       const progressBar = document.getElementById('progressBar');
       let startTime = Date.now();

       if (progressInterval) cancelAnimationFrame(progressInterval);

       function updateProgress() {
           const elapsed = Date.now() - startTime;
           const cycleElapsed = elapsed % totalTime;
           const progress = (cycleElapsed / totalTime) * 100;

           if (progressBar) progressBar.style.width = `${progress}%`;

           if (elapsed > 0 && cycleElapsed < 50) {
               startTime = Date.now();
           }

           progressInterval = requestAnimationFrame(updateProgress);
       }

       updateProgress();
   }

   function openApp() {
       const frame = document.getElementById('appFrame');
       if (frame) {
           frame.style.opacity = '0';
           frame.style.transition = 'opacity 1s ease';
       }

       setTimeout(() => {
           window.location.href = `index_prompt1.html?lang=${currentLang}`;
       }, 1000);
   }

       console.log('⚙️ إعدادات التوقيت:');
       console.log(`   🚀 سرعة الشريط: ${TIMING.TICKER_SPEED} بكسل/ثانية`);
       console.log(`   ⏸️ الفاصل بين الوجبات: ${TIMING.GAP_BETWEEN_MEALS} ثانية`);
   };
